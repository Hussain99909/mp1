<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music & Video Player (Manage FM Links)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* --- الإعدادات العامة --- */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --screen-bg: #0a0a1a;
            --frame-bg: #eef2f5;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Tajawal', 'Roboto', sans-serif;
            display: grid;
            place-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            color: #fff;
            /* *** الزوم 90% *** */
            zoom: 0.9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- هيكل المشغل --- */
        .music-player {
            width: 900px;
            max-width: 95%;
        }

        .player-frame {
            background-color: var(--frame-bg);
            border-radius: 30px 30px 15px 15px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.8),
                        inset 0 -5px 10px rgba(0, 0, 0, 0.1);
        }

        .screen {
            background-color: var(--screen-bg);
            border-radius: 20px;
            border: 2px solid #334;
            padding: 25px;
            overflow: hidden;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.05) 100%);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            position: relative; 
        }

        /* --- محتوى الشاشة --- */
        .main-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .panel.left { flex-basis: 25%; }
        .panel.center { 
            flex-basis: 40%; 
            flex-grow: 1;
            align-items: stretch; 
        }
        .panel.right { 
            flex-basis: 30%; 
        }

        /* --- العناصر الزجاجية (الأزرار والدوائر) --- */
        .btn-glass, .dial, .fm-nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* الأزرار المربعة الشفافة */
        .quick-controls {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .btn-glass {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            font-size: 1.2rem;
            color: #eee;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* الدوائر (Vision و CD) */
        .dial {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 3rem;
            font-weight: bold;
        }

        .vision-dial {
            background: linear-gradient(145deg, #a855f7, #6366f1);
            box-shadow: 0 0 20px #a855f7;
            color: #fff;
        }

        .cd-dial {
            background: linear-gradient(145deg, #22d3ee, #0ea5e9);
            box-shadow: 0 0 20px #22d3ee;
            position: relative;
            cursor: pointer; 
            display: flex; 
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            transition: background 0.1s linear, box-shadow 0.1s linear;
        }

        .cd-inner {
            width: 40px;
            height: 40px;
            background: var(--screen-bg);
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            z-index: 1; 
        }

        .cd-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                radial-gradient(circle at center, transparent 40%, rgba(255,255,255,0.1) 42%, transparent 44%), 
                repeating-linear-gradient(45deg, 
                    rgba(255,255,255,0.2) 0px, 
                    rgba(255,255,255,0.2) 2px, 
                    transparent 2px, 
                    transparent 15px
                ),
                repeating-linear-gradient(-45deg, 
                    rgba(255,255,255,0.2) 0px, 
                    rgba(255,255,255,0.2) 2px, 
                    transparent 2px, 
                    transparent 15px
                );
            z-index: 0; 
        }
       
        .cd-dial.rotating .cd-lines { 
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .visualizer-placeholder {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.4);
            transition: background 0.5s ease;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* --- خلفيات Visualizer المتحركة --- */
        @keyframes subtleWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes subtleShine {
            0% { opacity: 0.1; }
            50% { opacity: 0.3; }
            100% { opacity: 0.1; }
        }

        .viz-style-1 { background-color: var(--glass-bg); }
        .viz-style-2 {
            background: linear-gradient(135deg, #a855f7, #6366f1, #22d3ee, #0ea5e9);
            background-size: 400% 400%;
            animation: subtleWave 15s ease infinite;
        }
        .viz-style-3 {
            background-color: var(--glass-bg);
            background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1)),
                            linear-gradient(-45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1));
            background-size: 30px 30px;
            position: relative;
            overflow: hidden;
        }
        .viz-style-3::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: subtleShine 5s linear infinite;
        }

        /* --- أزرار التحكم بالصوت --- */
        .volume-controls {
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            width: 120px; 
            height: 55px;
        }
        
        .volume-controls .btn-glass {
            width: 40px; 
            height: 40px; 
            font-size: 1rem; 
            border-radius: 8px; 
        }
        
        #volumeLevelDisplay {
            font-family: 'Roboto', sans-serif; 
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
            flex-grow: 1; 
            text-align: center;
        }


        /* --- معلومات المسار (أسفل الشاشة) --- */
        .track-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }
        .track-info > span {
            font-size: 1.1rem;
            color: #aaa;
            font-family: 'Roboto', sans-serif;
            min-width: 60px; 
        }
        
        #bufferInfo {
            color: #00ffff; 
            text-align: left;
        }
        
        /* --- الشريط الملون والمقابض السفلية --- */
        .bottom-bar {
            display: flex;
            align-items: center;
            margin-top: 10px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
        }

        .knob {
            width: 60px;
            height: 60px;
            background: #d0d5db;
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.2), 
                        inset 0 -3px 6px rgba(255,255,255,0.7),
                        0 2px 5px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .color-bar {
            flex-grow: 1;
            height: 50px;
            background: linear-gradient(90deg, 
                #ff00ff, #ff0066, #ff6600, #ffff00, 
                #00ff00, #00ffff, #0066ff, #6600ff);
            border-radius: 25px;
            margin: 0 -20px; 
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 0 25px 5px rgba(255, 105, 180, 0.5),
                        inset 0 1px 2px rgba(255, 255, 255, 0.4);
            cursor: pointer; 
        }

        .color-bar button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            font-weight: bold;
            border-radius: 15px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-family: 'Tajawal', sans-serif;
        }

        .color-bar button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* --- إضافات وضع الفيديو --- */
        .hidden {
            display: none !important; 
        }

        #musicControls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #videoPlayer {
            width: 100%;
            height: 200px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: grid;
            place-items: center;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #videoPlayer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #videoPlayer video {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 15px;
        }

        #videoPlaylist {
            width: 100%;
            height: calc(120px + 120px + 20px); 
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 5px;
        }

        #videoPlaylist button {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            color: #eee;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }
        #videoPlaylist button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* --- إضافة وضع FM --- */
        
        /* --- مؤثرات بصرية --- */
        @keyframes pulseGlow {
            0% {
                color: #00ffff;
                text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            }
            50% {
                color: #99ffff; 
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; 
            }
            100% {
                color: #00ffff;
                text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            }
        }

        @keyframes broadcastWave {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.0); 
                opacity: 0;
            }
        }
        
        @keyframes pulseRecord {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* --- نهاية المؤثرات --- */


        /* 1. شاشة مشغل FM */
        #fmPlayerView {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        #currentStreamName {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            text-align: center;
            animation: pulseGlow 2.5s infinite ease-in-out;
            margin-top: 10px; 
        }

        /* أيقونة البث */
        #fmPlayerView .fa-tower-broadcast {
            font-size: 2.5rem; 
            color: #00ffff; 
            opacity: 0.7;
            position: relative; 
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.7));
        }
        
        #fmPlayerView .fa-tower-broadcast::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%; 
            background: #00ffff;
            animation: broadcastWave 2s infinite linear;
            z-index: 0;
            opacity: 0; 
        }
        
        #fmNav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; 
        }
        
        .fm-nav-btn {
            width: 50px; 
            height: 50px;
            border-radius: 8px; 
            font-size: 1.2rem; 
            color: #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .fm-nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        #fmPlayButton {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.4);
        }
        
        #fmRecordButton.recording i {
            color: #ff4d4d; 
            text-shadow: 0 0 10px #ff0000;
            animation: pulseRecord 1.5s infinite ease-in-out;
        }


        /* 2. شاشة إضافة روابط FM (منبثقة) */
        #fmModeOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            z-index: 100;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .fm-overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .fm-overlay-header h3 {
            text-align: center;
            color: #00ffff;
            border-bottom: none; 
            padding-bottom: 0;
            margin: 0;
        }
        
        .fm-overlay-header .btn-glass {
            width: 40px;
            height: 40px;
            font-size: 1rem;
            border-radius: 8px;
        }
        
        #fmAddForm {
            flex-direction: column;
            gap: 10px;
            margin-top: 10px; 
        }
        
        #fmAddForm input {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
        }
        
        #fmAddForm input::placeholder {
            color: #888;
        }
        
        #fmAddForm .form-actions {
            display: flex;
            gap: 10px;
        }
        
        #fmAddForm .form-actions button {
            flex-grow: 1;
            padding: 8px;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        #fmAddForm .form-actions button[type="submit"] {
            background: #00ffff;
            color: #0a0a1a;
            border: none;
        }
        #fmAddForm .form-actions button[type="submit"]:hover {
            background: #fff;
        }
        
        #fmAddForm .form-actions button[type="button"] {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: #eee;
        }
        #fmAddForm .form-actions button[type="button"]:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        
        #fmLinkList {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0; 
        }
        
        .fm-list-item {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }
        
        .fm-list-item span {
            flex-grow: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fm-item-controls {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .fm-list-item button {
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 5px;
            transition: all 0.2s ease;
            line-height: 1;
        }
        
        .fm-list-item .copy-btn:hover {
            color: #f0ad4e; 
            background: rgba(240, 173, 78, 0.1);
        }
        .fm-list-item .play-btn:hover {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
        }
        .fm-list-item .delete-btn:hover {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }
        .fm-list-item .edit-btn:hover {
            color: #5bc0de;
            background: rgba(91, 192, 222, 0.1);
        }
        .fm-list-item .move-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        #fmCloseButton {
            background: var(--glass-bg);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 8px;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px; 
        }
        #fmCloseButton:hover {
            background: rgba(255, 77, 77, 0.2);
        }

    </style>
    
    <style>
        @media (max-width: 768px) {
            
            /* 1. إعدادات عامة للجسم وإلغاء الزوم */
            body {
                zoom: 1; /* إلغاء الزوم الثابت */
                padding: 5px 0;
                min-height: 100vh;
            }
            
            html, body {
                min-width: 100%;
                overflow-x: hidden; /* منع التمرير الأفقي */
            }
    
            /* 2. تعديل الحاوية الرئيسية والإطارات */
            .music-player {
                width: 100%; /* جعل المشغل بعرض الشاشة */
                max-width: 100%;
                padding: 0 5px;
            }
    
            .player-frame {
                padding: 10px; /* تقليل الحشوة الداخلية */
                border-radius: 20px 20px 10px 10px;
            }
    
            .screen {
                padding: 10px; /* تقليل حشوة الشاشة */
                border-radius: 15px;
            }
    
            /* 3. التعديل الأهم: تحويل الواجهة الرئيسية إلى عمودية */
            .main-ui {
                flex-direction: column; /* جعل اللوحات (يمين، وسط، يسار) مكدسة عمودياً */
                align-items: center;
                gap: 15px;
            }
            
            /* 4. جعل اللوحات بعرض كامل وإعادة ترتيبها */
            .panel.left, .panel.center, .panel.right {
                flex-basis: auto;
                width: 100%;
            }
            
            .panel.center { order: 1; } /* المحتوى الرئيسي أولاً */
            .panel.right { order: 2; }  /* عناصر التحكم بالصوت/قائمة الفيديو ثانياً */
            .panel.left { order: 3; }   /* الأزرار الإضافية أخيراً */
            
            .panel.left, .panel.right {
                 align-items: center; /* توسيط المحتوى المتبقي */
            }
    
            /* 5. تصغير حجم الأقراص الدوارة والأزرار */
            .dial {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }
            
            .cd-inner {
                width: 30px;
                height: 30px;
            }
    
            .btn-glass {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }
            
            .quick-controls {
                gap: 15px;
                justify-content: center;
            }
    
            /* 6. تعديل لوحة التحكم اليمنى (الصوت وقائمة الفيديو) */
            #musicControls {
                flex-direction: row; /* جعل القرص وجهاز التحكم بالصوت بجانب بعضهما */
                justify-content: space-around;
                width: 100%;
            }
            
            .volume-controls {
                width: auto;
                flex-direction: column; /* جعل أزرار الصوت عمودية بجانب الرقم */
                height: 100px;
                justify-content: space-between;
            }
            
            .volume-controls .btn-glass {
                width: 45px;
                height: 45px;
            }
    
            #videoPlaylist {
                height: 200px; /* تقليل ارتفاع قائمة الفيديو */
                max-height: 200px;
            }
    
            /* 7. تعديل اللوحة الوسطى (المحتوى) */
            .visualizer-placeholder, #videoPlayer, #fmPlayerView {
                height: 220px; /* زيادة ارتفاع المحتوى الرئيسي ليملأ العرض */
            }
            
            #fmPlayerView .fa-tower-broadcast { font-size: 2.2rem; }
            #currentStreamName { font-size: 1.3rem; margin-top: 5px; }
    
            /* 8. تعديل شريط المعلومات السفلي */
            .track-info {
                flex-wrap: wrap; /* السماح للعناصر بالالتفاف */
                justify-content: center;
                gap: 10px;
                padding-top: 10px;
                margin-top: 10px;
            }
            
            /* نقل أزرار FM للأعلى لتكون واضحة */
            #fmNav {
                order: -1; /* جعلها أول عنصر */
                width: 100%;
                justify-content: center;
            }
    
            /* 9. تعديل الشريط الملون السفلي */
            .bottom-bar {
                margin-top: 5px;
            }
            
            .knob {
                display: none; /* إخفاء المقابض الجانبية لتوفير المساحة */
            }
    
            .color-bar {
                margin: 0 5px; /* إزالة الهامش السالب */
                border-radius: 20px;
                height: 45px;
                padding: 0 10px;
            }
    
            .color-bar button {
                padding: 4px 8px;
                font-size: 0.8rem; /* تصغير خط الأزرار */
                border-radius: 10px;
            }
    
            /* 10. تعديل شاشة إدارة روابط FM (النافذة المنبثقة) */
            #fmModeOverlay {
                padding: 15px;
                gap: 10px;
            }
            
            .fm-overlay-header h3 { font-size: 1.1rem; }
            
            /* جعل أزرار الإضافة والإلغاء مكدسة */
            #fmAddForm .form-actions {
                flex-direction: column;
            }
    
            /* جعل عناصر القائمة مكدسة لسهولة القراءة */
            .fm-list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .fm-list-item span {
                font-size: 1rem;
            }
    
            .fm-item-controls {
                width: 100%;
                justify-content: flex-end; /* وضع الأزرار في النهاية */
                gap: 5px;
            }
            
            .fm-list-item button {
                padding: 6px 8px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    
    <input type="file" id="bgImageInput" style="display:none;" accept="image/*">
    
    <audio id="audioStreamPlayer" style="display:none;"></audio>

    <div class="music-player">
        <div class="player-frame">
            <div class="screen">
                
                <div class="main-ui">
                    <div class="panel left">
                        
                        <div class="dial cd-dial" id="cdDialLeft"> 
                            <div class="cd-lines"></div> 
                            <div class="cd-inner"></div>
                        </div>
                        
                        <div class="quick-controls">
                            <button class="btn-glass"><i class="fa-solid fa-power-off"></i></button>
                            <button class="btn-glass"><i class="fa-solid fa-gear"></i></button>
                            <button class="btn-glass"><i class="fa-solid fa-shuffle"></i></button>
                        </div>
                    </div>

                    <div class="panel center">
                        <div class="visualizer-placeholder viz-style-1" id="visualizer">
                            <i class="fa-solid fa-music"></i>
                            <span>Visualizer Area</span>
                        </div>
                        
                        <div id="videoPlayer" class="hidden">
                            <span>اختر فيديو من القائمة</span>
                        </div>
                        
                        <div id="fmPlayerView" class="hidden">
                            <i class="fa-solid fa-tower-broadcast"></i>
                        </div>
                        
                        <span id="currentStreamName" class="hidden">اختر محطة من القائمة</span>

                    </div>

                    <div class="panel right">
                        <div id="musicControls">
                            <div class="dial cd-dial" id="cdDial"> 
                                <div class="cd-lines"></div> 
                                <div class="cd-inner"></div>
                            </div>
                            
                            <div class="volume-controls">
                                <button class="btn-glass" id="volumeDown" title="خفض الصوت"><i class="fa-solid fa-volume-down"></i></button>
                                <span id="volumeLevelDisplay">100</span>
                                <button class="btn-glass" id="volumeUp" title="رفع الصوت"><i class="fa-solid fa-volume-up"></i></button>
                            </div>
                        </div>

                        <div id="videoPlaylist" class="hidden">
                            </div>
                    </div>
                </div>

                <div class="track-info">
                    <span id="bufferInfo">Buff: 0s</span>
                    
                    <div id="fmNav">
                        <button id="fmPrevButton" class="fm-nav-btn" title="السابق"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="fmPlayButton" class="fm-nav-btn" title="تشغيل/إيقاف"><i class="fa-solid fa-play"></i></button>
                        <button id="fmNextButton" class="fm-nav-btn" title="التالي"><i class="fa-solid fa-forward-step"></i></button>
                        <button id="fmRecordButton" class="fm-nav-btn" title="تسجيل"><i class="fa-solid fa-circle"></i></button>
                    </div>
                    
                    <span>2,920</span>
                </div>

                <div id="fmModeOverlay" class="hidden">
                    
                    <div class="fm-overlay-header">
                        <h3>إدارة روابط البث (FM)</h3>
                        <button id="fmShowAddFormButton" class="btn-glass" title="إضافة رابط جديد">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    
                    <form id="fmAddForm" class="hidden">
                        <input type="text" id="fmStreamName" placeholder="اسم المحطة (مثال: راديو بغداد)" required>
                        <input type="url" id="fmStreamUrl" placeholder="رابط البث (m3u8, mp3, ...)" required>
                        <div class="form-actions">
                            <button type="submit">إضافة</button>
                            <button type="button" id="fmCancelAddButton">إلغاء</button>
                        </div>
                    </form>
                    
                    <hr style="border-color: var(--border-color); opacity: 0.5;">
                    
                    <div id="fmLinkList">
                        </div>
                    
                    <button id="fmCloseButton">إغلاق</button>
                </div>
                </div>
        </div>

        <div class="bottom-bar">
            <div class="knob left"></div>
            <div class="color-bar">
                <button id="fmButton">FM</button>
                <button>PLY</button>
                <button>EQ</button>
                <button id="modButton">MOD</button>
                <button id="setButton">SET</button>
                <button id="moreButton">...</button>
            </div>
            <div class="knob right"></div>
        </div>
    </div>

    <script>
        // --- 1. التحكم بالقرص الدوار ---
        
        const cdDial = document.getElementById('cdDial');
        const cdDialLeft = document.getElementById('cdDialLeft'); 

        cdDial.addEventListener('click', () => {
            const isRotating = cdDial.classList.toggle('rotating');
            if (isRotating) {
                cdDialLeft.classList.add('rotating');
            } else {
                cdDialLeft.classList.remove('rotating');
            }
        });
        
        cdDialLeft.addEventListener('click', () => {
             const isRotating = cdDialLeft.classList.toggle('rotating');
             if (isRotating) {
                cdDial.classList.add('rotating');
            } else {
                cdDial.classList.remove('rotating');
            }
        });


        // --- 2. متغيرات تتبع الوضع ---
        let mainDisplayMode = 'music'; // 'music', 'video', 'fm'
        
        // --- 3. جلب العناصر الأساسية ---
        const modButton = document.getElementById('modButton');
        const setButton = document.getElementById('setButton');
        const moreButton = document.getElementById('moreButton');
        
        // عناصر وضع الموسيقى
        const visualizer = document.getElementById('visualizer');
        const musicControls = document.getElementById('musicControls');

        // عناصر وضع الفيديو
        const videoPlayer = document.getElementById('videoPlayer');
        const videoPlaylist = document.getElementById('videoPlaylist');
        const videoPlaylistStore = [];

        // --- 4. عناصر وضع FM ---
        const fmButton = document.getElementById('fmButton');
        const fmPlayerView = document.getElementById('fmPlayerView');
        const fmModeOverlay = document.getElementById('fmModeOverlay');
        const fmCloseButton = document.getElementById('fmCloseButton');
        
        // نموذج الإضافة
        const fmAddForm = document.getElementById('fmAddForm');
        const fmStreamName = document.getElementById('fmStreamName');
        const fmStreamUrl = document.getElementById('fmStreamUrl');
        const fmLinkList = document.getElementById('fmLinkList');
        
        const fmShowAddFormButton = document.getElementById('fmShowAddFormButton');
        const fmCancelAddButton = document.getElementById('fmCancelAddButton');


        // مشغل الصوت
        const audioStreamPlayer = document.getElementById('audioStreamPlayer');
        const currentStreamName = document.getElementById('currentStreamName');
        const fmPlayButton = document.getElementById('fmPlayButton');
        const fmPlayIcon = fmPlayButton.querySelector('i');
        const fmPrevButton = document.getElementById('fmPrevButton');
        const fmNextButton = document.getElementById('fmNextButton');

        // أزرار وشاشة الصوت 
        const volumeDownButton = document.getElementById('volumeDown');
        const volumeUpButton = document.getElementById('volumeUp');
        const volumeLevelDisplay = document.getElementById('volumeLevelDisplay'); 

        // عرض البافر
        const bufferInfoDisplay = document.getElementById('bufferInfo');

        // متغيرات حالة FM
        let fmStreamStore = [];
        let currentStreamIndex = -1;
        let hls = null;

        // متغيرات التسجيل
        const fmRecordButton = document.getElementById('fmRecordButton');
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let audioContext = null;
        let audioStreamDestination = null;
        let audioSource = null;
        
        // متغير HLS الخاص بالفيديو
        let hlsVideo = null;
        
        const bgImageInput = document.getElementById('bgImageInput');
        
        
        // --- 5. وظيفة تبديل الواجهات الرئيسية ---
        function switchToMode(mode) {
            mainDisplayMode = mode;
            
            visualizer.classList.add('hidden');
            videoPlayer.classList.add('hidden');
            fmPlayerView.classList.add('hidden');
            musicControls.classList.add('hidden');
            videoPlaylist.classList.add('hidden');
            currentStreamName.classList.add('hidden');

            if (mode !== 'fm') stopFmStream();
            if (mode !== 'video') stopVideoStream(); 

            if (mode === 'music') {
                visualizer.classList.remove('hidden');
                musicControls.classList.remove('hidden');
                modButton.textContent = 'MOD';
            } else if (mode === 'video') {
                videoPlayer.classList.remove('hidden');
                videoPlaylist.classList.remove('hidden');
                modButton.textContent = 'VID';
            } else if (mode === 'fm') {
                fmPlayerView.classList.remove('hidden');
                musicControls.classList.remove('hidden'); 
                modButton.textContent = 'MOD'; 
                currentStreamName.classList.remove('hidden');
            }
        }

        // --- 6. تحديث مستمعي الأزرار ---
        
        modButton.addEventListener('click', () => {
            if (mainDisplayMode === 'music' || mainDisplayMode === 'fm') {
                switchToMode('video');
            } else {
                switchToMode('music');
            }
        });
        
        fmButton.addEventListener('click', () => {
            fmModeOverlay.classList.remove('hidden');
            updateFmLinkListUI();
            fmAddForm.classList.add('hidden');
        });

        fmCloseButton.addEventListener('click', () => {
            fmModeOverlay.classList.add('hidden');
        });
        
        fmShowAddFormButton.addEventListener('click', () => {
            fmAddForm.classList.remove('hidden');
        });
        
        fmCancelAddButton.addEventListener('click', () => {
            fmAddForm.classList.add('hidden');
            fmStreamName.value = '';
            fmStreamUrl.value = '';
        });
        
        
        // --- 7. منطق إدارة روابط FM (مُحدث بالكامل) ---

        function loadStreamsFromStorage() {
            const storedStreams = localStorage.getItem('fmStreams');
            if (storedStreams) {
                fmStreamStore = JSON.parse(storedStreams);
            }
        }

        function saveStreamsToStorage() {
            localStorage.setItem('fmStreams', JSON.stringify(fmStreamStore));
        }

        function updateFmLinkListUI() {
            fmLinkList.innerHTML = ''; 
            if (fmStreamStore.length === 0) {
                fmLinkList.innerHTML = '<span style="color: #888; text-align: center; display: block;">لا توجد روابط محفوظة</span>';
                return;
            }
            
            fmStreamStore.forEach((stream, index) => {
                const item = document.createElement('div');
                item.className = 'fm-list-item';
                
                let controlsHtml = `
                    <button class="copy-btn" data-index="${index}" title="نسخ الرابط"><i class="fa-solid fa-copy"></i></button>
                    <button class="edit-btn" data-index="${index}" title="تعديل"><i class="fa-solid fa-pencil"></i></button> 
                    <button class="play-btn" data-index="${index}" title="تشغيل"><i class="fa-solid fa-play"></i></button>
                    <button class="delete-btn" data-index="${index}" title="حذف"><i class="fa-solid fa-trash"></i></button>
                `;
                
                if (index > 0) {
                    controlsHtml += `<button class="move-btn move-up" data-index="${index}" title="نقل للأعلى"><i class="fa-solid fa-arrow-up"></i></button>`;
                }
                if (index < fmStreamStore.length - 1) {
                    controlsHtml += `<button class="move-btn move-down" data-index="${index}" title="نقل للأسفل"><i class="fa-solid fa-arrow-down"></i></button>`;
                }

                item.innerHTML = `
                    <span>${stream.name}</span>
                    <div class="fm-item-controls">
                        ${controlsHtml}
                    </div>
                `;
                fmLinkList.appendChild(item);
            });
        }
        
        fmLinkList.addEventListener('click', (e) => {
            const button = e.target.closest('button');
            if (!button) return;
            
            const index = parseInt(button.dataset.index, 10);
            
            if (button.classList.contains('play-btn')) {
                playStream(index);
                fmModeOverlay.classList.add('hidden');
            } else if (button.classList.contains('delete-btn')) {
                deleteStream(index);
            } else if (button.classList.contains('copy-btn')) {
                copyStreamUrl(index);
            } else if (button.classList.contains('edit-btn')) {
                editStream(index);
            } else if (button.classList.contains('move-up')) {
                moveStream(index, 'up');
            } else if (button.classList.contains('move-down')) {
                moveStream(index, 'down');
            }
        });
        
        fmAddForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = fmStreamName.value.trim();
            const url = fmStreamUrl.value.trim();
            
            if (name && url) {
                fmStreamStore.push({ name, url });
                saveStreamsToStorage();
                updateFmLinkListUI();
                fmStreamName.value = '';
                fmStreamUrl.value = '';
                fmAddForm.classList.add('hidden');
            }
        });
        
        function deleteStream(index) {
            if (confirm(`هل أنت متأكد من حذف "${fmStreamStore[index].name}"؟`)) {
                fmStreamStore.splice(index, 1);
                saveStreamsToStorage();
                updateFmLinkListUI();
                
                if(index === currentStreamIndex) {
                    stopFmStream();
                    currentStreamName.textContent = 'اختر محطة من القائمة';
                    currentStreamIndex = -1;
                }
            }
        }
        
        function copyStreamUrl(index) {
            if (index >= 0 && index < fmStreamStore.length) {
                const urlToCopy = fmStreamStore[index].url;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(urlToCopy).then(() => {
                        alert('تم نسخ الرابط: ' + urlToCopy);
                    }).catch(err => {
                        alert('فشل النسخ');
                    });
                } else {
                    alert('النسخ غير مدعوم في هذا المتصفح');
                }
            }
        }
        
        function playLastAddedStream() {
            if (fmStreamStore.length > 0) {
                const lastIndex = fmStreamStore.length - 1;
                playStream(lastIndex);
            } else {
                fmModeOverlay.classList.remove('hidden');
                updateFmLinkListUI();
            }
        }
        
        function editStream(index) {
            if (index < 0 || index >= fmStreamStore.length) return;
            
            const currentStream = fmStreamStore[index];
            const newName = prompt("أدخل الاسم الجديد:", currentStream.name);
            if (newName === null) return;
            const newUrl = prompt("أدخل الرابط الجديد:", currentStream.url);
            if (newUrl === null) return;
            
            if (newName.trim() && newUrl.trim()) {
                fmStreamStore[index] = { name: newName.trim(), url: newUrl.trim() };
                saveStreamsToStorage();
                updateFmLinkListUI();
            } else {
                alert("يجب إدخال اسم ورابط صالحين.");
            }
        }
        
        function moveStream(index, direction) {
            if (direction === 'up' && index > 0) {
                [fmStreamStore[index], fmStreamStore[index - 1]] = [fmStreamStore[index - 1], fmStreamStore[index]];
            } else if (direction === 'down' && index < fmStreamStore.length - 1) {
                [fmStreamStore[index], fmStreamStore[index + 1]] = [fmStreamStore[index + 1], fmStreamStore[index]];
            } else {
                return;
            }
            saveStreamsToStorage();
            updateFmLinkListUI();
        }

        // --- 8. منطق مشغل FM ---
        
        function playDefaultStream() {
            stopFmStream(); 
            currentStreamIndex = -1; 
            
            const streamUrl = "https://cdn3.wowza.com/5/VW9lVUsxSEhCR21q/livehttp/theStream_aac/chunklist.m3u8";
            const streamName = "مسجد الموسوي الكبير"; 
            
            currentStreamName.textContent = streamName;
            switchToMode('fm'); 

            // *** الكود الخاص بالتشغيل التلقائي موجود هنا ***
            // *** سيحاول التشغيل، وإذا فشل بسبب سياسة المتصفح، سيعرض زر التشغيل ***
            if (streamUrl.includes('.m3u8')) {
                const hlsConfig = { maxBufferLength: 60 };
                if (Hls.isSupported()) {
                    hls = new Hls(hlsConfig); 
                    hls.loadSource(streamUrl);
                    hls.attachMedia(audioStreamPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() { 
                        var playPromise = audioStreamPlayer.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.warn("Autoplay was prevented by browser.");
                                fmPlayIcon.classList.remove('fa-pause');
                                fmPlayIcon.classList.add('fa-play');
                            });
                        }
                    });
                } else if (audioStreamPlayer.canPlayType('application/vnd.apple.mpegURL')) {
                    audioStreamPlayer.src = streamUrl; 
                    var playPromise = audioStreamPlayer.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.warn("Autoplay was prevented by browser.");
                            fmPlayIcon.classList.remove('fa-pause');
                            fmPlayIcon.classList.add('fa-play');
                        });
                    }
                }
            } else {
                audioStreamPlayer.src = streamUrl; 
                var playPromise = audioStreamPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.warn("Autoplay was prevented by browser.");
                        fmPlayIcon.classList.remove('fa-pause');
                        fmPlayIcon.classList.add('fa-play');
                    });
                }
            }
        }
        
        function playStream(index) {
            if (index < 0 || index >= fmStreamStore.length) return; 
            stopFmStream(); 
            currentStreamIndex = index;
            const stream = fmStreamStore[index];
            const streamUrl = stream.url;
            currentStreamName.textContent = stream.name;
            switchToMode('fm'); 

            if (streamUrl.includes('.m3u8')) {
                const hlsConfig = { maxBufferLength: 60 };
                if (Hls.isSupported()) {
                    hls = new Hls(hlsConfig); 
                    hls.loadSource(streamUrl);
                    hls.attachMedia(audioStreamPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() { audioStreamPlayer.play(); });
                } else if (audioStreamPlayer.canPlayType('application/vnd.apple.mpegURL')) {
                    audioStreamPlayer.src = streamUrl; audioStreamPlayer.play();
                }
            } else {
                audioStreamPlayer.src = streamUrl; audioStreamPlayer.play();
            }
        }
        function stopFmStream() {
            if (isRecording) stopRecording();
            audioStreamPlayer.pause(); audioStreamPlayer.src = ''; 
            if (hls) { hls.destroy(); hls = null; }
            
            cdDial.classList.remove('rotating');
            cdDialLeft.classList.remove('rotating');
            
            fmPlayIcon.classList.remove('fa-pause'); fmPlayIcon.classList.add('fa-play');
            bufferInfoDisplay.textContent = "Buff: 0s";
        }
        function togglePlayPause() {
            // إذا كان كل شيء متوقفاً، ابدأ بالافتراضي
            if (!audioStreamPlayer.src && currentStreamIndex === -1 && audioStreamPlayer.paused) {
                playDefaultStream();
                return;
            }
            // إذا كان المشغل متوقفاً مؤقتاً، قم بالتشغيل
            if (audioStreamPlayer.paused) {
                 audioStreamPlayer.play();
            } else {
            // وإلا، قم بالإيقاف المؤقت
                 audioStreamPlayer.pause();
            }
        }
        function playNext() {
            if (fmStreamStore.length === 0) return;
            let nextIndex = (currentStreamIndex + 1) % fmStreamStore.length;
            playStream(nextIndex);
        }
        function playPrev() {
            if (fmStreamStore.length === 0) return;
            let prevIndex = (currentStreamIndex - 1 + fmStreamStore.length) % fmStreamStore.length;
            playStream(prevIndex);
        }
        fmPlayButton.addEventListener('click', togglePlayPause);
        fmNextButton.addEventListener('click', playNext);
        fmPrevButton.addEventListener('click', playPrev);

        // --- 9. منطق التحكم بالصوت ---
        volumeDownButton.addEventListener('click', () => { changeVolume(-0.1); });
        volumeUpButton.addEventListener('click', () => { changeVolume(0.1); });
        function changeVolume(amount) {
            let newVolume = audioStreamPlayer.volume + amount;
            if (newVolume < 0) newVolume = 0; if (newVolume > 1) newVolume = 1;
            audioStreamPlayer.volume = newVolume; updateVolumeDisplay(); 
        }
        function updateVolumeDisplay() {
            const level = Math.round(audioStreamPlayer.volume * 100);
            volumeLevelDisplay.textContent = level;
        }
        
        // --- 10. منطق عرض البافر ---
        audioStreamPlayer.addEventListener('progress', updateBufferInfo);
        audioStreamPlayer.addEventListener('timeupdate', updateBufferInfo);
        function updateBufferInfo() {
            if (audioStreamPlayer.buffered.length > 0) {
                try {
                    const bufferedEnd = audioStreamPlayer.buffered.end(0); 
                    const bufferedAhead = bufferedEnd - audioStreamPlayer.currentTime;
                    bufferInfoDisplay.textContent = `Buff: ${Math.round(bufferedAhead)}s`;
                } catch (e) { bufferInfoDisplay.textContent = "Buff: --"; }
            }
        }
        audioStreamPlayer.addEventListener('play', () => {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioSource = audioContext.createMediaElementSource(audioStreamPlayer);
                    audioStreamDestination = audioContext.createMediaStreamDestination();
                    audioSource.connect(audioStreamDestination); audioSource.connect(audioContext.destination); 
                } catch (e) {
                    console.error("فشل إعداد AudioContext:", e);
                    fmRecordButton.disabled = true; fmRecordButton.title = "التسجيل غير مدعوم";
                }
            }
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            
            cdDial.classList.add('rotating');
            cdDialLeft.classList.add('rotating');
            
            fmPlayIcon.classList.remove('fa-play');
            fmPlayIcon.classList.add('fa-pause');
        });
        audioStreamPlayer.addEventListener('pause', () => {
            
            cdDial.classList.remove('rotating');
            cdDialLeft.classList.remove('rotating');
            
            fmPlayIcon.classList.remove('fa-pause');
            fmPlayIcon.classList.add('fa-play');
        });
        audioStreamPlayer.addEventListener('ended', () => {
            
            cdDial.classList.remove('rotating');
            cdDialLeft.classList.remove('rotating');
            
            fmPlayIcon.classList.remove('fa-pause');
            fmPlayIcon.classList.add('fa-play');
        });

        // --- 11. منطق التسجيل (*** تم التعديل بالكامل ***) ---
        
        // إنشاء كانفاس مخفي لاستخدامه في تسجيل الفيديو
        const videoRecordCanvas = document.createElement('canvas');
        videoRecordCanvas.id = "videoRecordCanvas";
        videoRecordCanvas.style.display = "none";
        document.body.appendChild(videoRecordCanvas);

        fmRecordButton.addEventListener('click', () => { 
            if (isRecording) stopRecording(); 
            else startRecording(); 
        });
        
        function startRecording() {
            if (audioStreamPlayer.paused || !audioStreamDestination) { 
                alert("يجب تشغيل البث أولاً لبدء التسجيل."); 
                return; 
            }
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();

            // --- هذا هو التعديل الرئيسي ---
            
            // 1. تحديد ما إذا كنا سنسجل فيديو (في وضع FM) أم صوتاً فقط
            const recordVideo = (mainDisplayMode === 'fm'); 
            
            let outputMimeType = 'audio/webm';
            let outputExtension = 'webm';
            let streamToRecord = audioStreamDestination.stream; // الافتراضي: صوت فقط

            if (recordVideo) {
                console.log("محاولة تسجيل الفيديو...");
                
                // 2. إعداد الكانفاس
                const viewElement = fmPlayerView; // نحن في وضع FM
                const canvas = videoRecordCanvas;
                const ctx = canvas.getContext('2d');
                // ضبط أبعاد الكانفاس لمطابقة العرض
                canvas.width = viewElement.clientWidth || 300; // قيمة افتراضية
                canvas.height = viewElement.clientHeight || 200; // قيمة افتراضية

                // 3. جلب تيار الصوت
                const audioStream = audioStreamDestination.stream;
                const audioTrack = audioStream.getAudioTracks()[0];
                
                // 4. جلب تيار الفيديو (من الكانفاس)
                const videoStream = canvas.captureStream(25); // 25 fps
                const videoTrack = videoStream.getVideoTracks()[0];

                // 5. دمج التيارات
                streamToRecord = new MediaStream([videoTrack, audioTrack]);
                outputMimeType = 'video/webm; codecs=vp8,opus'; // تحديد كوديك الفيديو والصوت
                outputExtension = 'webm'; // سيبقى webm لكنه الآن فيديو
                
                // 6. تحميل ورسم الخلفية (مرة واحدة في البداية)
                const computedStyle = window.getComputedStyle(viewElement);
                const bgImage = computedStyle.backgroundImage;
                
                if (bgImage && bgImage.startsWith('url(')) {
                    const imageUrl = bgImage.slice(5, -2); // إزالة url("...")
                    const img = new Image();
                    img.crossOrigin = "anonymous"; // محاولة لتجنب مشاكل CORS
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        console.log("تم رسم الصورة على الكانفاس.");
                    };
                    img.onerror = () => {
                        // في حال فشل تحميل الصورة، ارسم خلفية افتراضية
                        ctx.fillStyle = '#0a0a1a'; // لون الشاشة الافتراضي
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        console.log("فشل تحميل الصورة، تم رسم خلفية سوداء.");
                    };
                    img.src = imageUrl;
                } else {
                    // إذا لم تكن هناك صورة، ارسم لون الخلفية 
                    ctx.fillStyle = computedStyle.backgroundColor || '#0a0a1a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    console.log("لا توجد صورة، تم رسم لون الخلفية.");
                }
                
            } else {
                 // تسجيل صوت فقط (السلوك القديم)
                console.log("تسجيل الصوت فقط.");
                outputMimeType = 'audio/webm';
                outputExtension = 'webm';
                streamToRecord = audioStreamDestination.stream;
            }
            
            // --- نهاية التعديل الرئيسي ---


            recordedChunks = []; 
            const options = { mimeType: outputMimeType }; 
            
            try { 
                mediaRecorder = new MediaRecorder(streamToRecord, options); 
            } 
            catch (e) { 
                console.error("خطأ في MediaRecorder:", e); 
                // محاولة الرجوع إلى الوضع الافتراضي (صوت فقط) إذا فشل الفيديو
                if (recordVideo) {
                    console.warn("فشل تسجيل الفيديو، محاولة تسجيل الصوت فقط...");
                    outputMimeType = 'audio/webm';
                    outputExtension = 'webm';
                    streamToRecord = audioStreamDestination.stream;
                    const audioOptions = { mimeType: outputMimeType };
                    try {
                         mediaRecorder = new MediaRecorder(streamToRecord, audioOptions);
                    } catch (e2) {
                         alert("حدث خطأ عند بدء التسجيل. قد لا يكون المتصفح مدعوماً."); return; 
                    }
                } else {
                    alert("حدث خطأ عند بدء التسجيل. قد لا يكون المتصفح مدعوماً."); return;
                }
            }
            
            mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: outputMimeType }); // استخدام النوع المحدث
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.style.display = 'none'; a.href = url;
                const streamName = currentStreamName.textContent.trim().replace(/\s+/g, '_') || 'recording';
                
                // استخدام الامتداد المحدث (سيبقى webm، لكنه الآن فيديو)
                const filename = `${streamName}_${new Date().toISOString().slice(0, 19).replace('T', '_').replace(/:/g, '-')}.${outputExtension}`; 
                
                a.download = filename; document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url); document.body.removeChild(a);
            };
            
            mediaRecorder.start(); isRecording = true;
            fmRecordButton.classList.add('recording'); fmRecordButton.title = "إيقاف التسجيل";
            fmRecordButton.querySelector('i').classList.remove('fa-circle'); fmRecordButton.querySelector('i').classList.add('fa-stop');
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
            isRecording = false;
            fmRecordButton.classList.remove('recording'); fmRecordButton.title = "تسجيل";
            fmRecordButton.querySelector('i').classList.remove('fa-stop'); fmRecordButton.querySelector('i').classList.add('fa-circle');
        }

        // --- 12. منطق تغيير خلفية Visualizer ---
        let vizStyleIndex = 0; const vizStyles = ['viz-style-1', 'viz-style-2', 'viz-style-3'];
        function changeVisualizerStyle() {
            const currentBg = visualizer.style.backgroundImage;
            if (currentBg && currentBg.startsWith('url(')) {
                alert("لا يمكن تغيير النمط مع وجود خلفية مخصصة. انقر نقراً مزدوجاً على الشاشة لإزالتها أولاً.");
                return;
            }
            
            visualizer.classList.remove(...vizStyles); vizStyleIndex = (vizStyleIndex + 1) % vizStyles.length;
            visualizer.classList.add(vizStyles[vizStyleIndex]);
        }
        
        // --- 13. تحديث منطق زر SET ---
        setButton.addEventListener('click', () => {
            if (mainDisplayMode === 'video') {
                const url = window.prompt("أدخل رابط فيديو (يوتيوب أو m3u8):");
                if (url && url.trim() !== '') { videoPlaylistStore.push(url.trim()); updatePlaylistUI(); }
            } else if (mainDisplayMode === 'music') { changeVisualizerStyle(); }
        });

        // --- 14. الكود الخاص بوضع الفيديو ---
        moreButton.addEventListener('click', () => {
            if (mainDisplayMode === 'video') {
                const urlsText = window.prompt("أدخل الروابط (رابط واحد في كل سطر):", "");
                if (urlsText) {
                    const urls = urlsText.split('\n').map(url => url.trim()).filter(url => url !== '');
                    if (urls.length > 0) { videoPlaylistStore.push(...urls); updatePlaylistUI(); }
                }
            }
        });
        function updatePlaylistUI() {
            videoPlaylist.innerHTML = '';
            videoPlaylistStore.forEach((url, index) => {
                const videoId = convertToEmbedUrl(url, true); const button = document.createElement('button');
                if (videoId) button.textContent = `فيديو ${index + 1}: (YouTube ID: ${videoId})`;
                else if (url.includes('.m3u8')) button.textContent = `بث ${index + 1}: (M3U8 Stream)`;
                else button.textContent = `رابط ${index + 1}: (غير معروف)`;
                button.addEventListener('click', () => { playVideo(url); }); videoPlaylist.appendChild(button);
            });
        }
        function stopVideoStream() {
            if (hlsVideo) { hlsVideo.destroy(); hlsVideo = null; }
            videoPlayer.innerHTML = '<span>اختر فيديو من القائمة</span>';
        }
        function playVideo(url) {
            stopVideoStream(); const youtubeEmbedUrl = convertToEmbedUrl(url);
            if (youtubeEmbedUrl) {
                videoPlayer.innerHTML = `<iframe src="${youtubeEmbedUrl}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else if (url.includes('.m3u8')) {
                videoPlayer.innerHTML = `<video id="hlsVideoPlayer" controls autoplay></video>`;
                const videoElement = document.getElementById('hlsVideoPlayer');
                if (Hls.isSupported()) {
                    hlsVideo = new Hls(); hlsVideo.loadSource(url); hlsVideo.attachMedia(videoElement);
                    hlsVideo.on(Hls.Events.MANIFEST_PARSED, function() { videoElement.play(); });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegURL')) {
                    videoElement.src = url; videoElement.play();
                } else { videoPlayer.innerHTML = '<span>HLS video is not supported on this browser.</span>'; }
            } else { videoPlayer.innerHTML = '<span>رابط فيديو غير مدعوم</span>'; }
            switchToMode('video'); 
        }
        function convertToEmbedUrl(url, returnIdOnly = false) {
            let videoId = null;
            try {
                const urlObj = new URL(url); videoId = urlObj.searchParams.get('v');
                if (!videoId) { const pathnameParts = urlObj.pathname.split('/'); videoId = pathnameParts[pathnameParts.length - 1]; }
            } catch (e) {
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
                const match = url.match(regex); if (match) videoId = match[1];
            }
            if (videoId) { if (returnIdOnly) return videoId; return `https://www.youtube.com/embed/${videoId}`; }
            return null;
        }


        // --- 14.5. منطق تغيير لون القرص عبر شريط الألوان (تلقائي ويدوي) ---
        
        const colorBar = document.querySelector('.color-bar');
        const colorBarCanvas = document.createElement('canvas');
        let colorCanvasContext = null;
        let colorCycleIntervalId = null;
        let isColorCycling = false;
        let cyclePosition = 0; 

        function shadeColor(color, percent) {
            let r, g, b;
            if (color.startsWith('rgb')) {
                [r, g, b] = color.match(/\d+/g).map(Number);
            } else { return color; }

            r = parseInt(r * (100 + percent) / 100);
            g = parseInt(g * (100 + percent) / 100);
            b = parseInt(b * (100 + percent) / 100);

            r = Math.max(0, Math.min(255, r));
            g = Math.max(0, Math.min(255, g));
            b = Math.max(0, Math.min(255, b));

            return `rgb(${r}, ${g}, ${b})`;
        }

        function applyDialColor(color) {
            const darkerColor = shadeColor(color, -30);
            const newGradient = `linear-gradient(145deg, ${color}, ${darkerColor})`;
            const newShadow = `0 0 20px ${color}`;

            cdDial.style.background = newGradient;
            cdDial.style.boxShadow = newShadow;
            cdDialLeft.style.background = newGradient;
            cdDialLeft.style.boxShadow = newShadow;
        }

        function initializeColorCanvas() {
            try {
                const barWidth = colorBar.clientWidth;
                const barHeight = colorBar.clientHeight;
                if (barWidth === 0 || barHeight === 0) return;

                colorBarCanvas.width = barWidth;
                colorBarCanvas.height = barHeight;
                const ctx = colorBarCanvas.getContext('2d');
                if (!ctx) return;

                const gradient = ctx.createLinearGradient(0, 0, barWidth, 0);
                gradient.addColorStop(0, '#ff00ff'); gradient.addColorStop(1/7, '#ff0066');
                gradient.addColorStop(2/7, '#ff6600'); gradient.addColorStop(3/7, '#ffff00');
                gradient.addColorStop(4/7, '#00ff00'); gradient.addColorStop(5/7, '#00ffff');
                gradient.addColorStop(6/7, '#0066ff'); gradient.addColorStop(1, '#6600ff');

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, barWidth, barHeight);
                colorCanvasContext = ctx;
            } catch (e) {
                console.error("فشل في تهيئة كانفاس الألوان:", e);
                colorCanvasContext = null;
            }
        }
        
        function stopColorCycle() {
            if (colorCycleIntervalId) {
                clearInterval(colorCycleIntervalId);
                colorCycleIntervalId = null;
            }
            isColorCycling = false;
        }

        function startColorCycle() {
            if (!colorCanvasContext) {
                initializeColorCanvas();
                if (!colorCanvasContext) {
                    setTimeout(startColorCycle, 100); 
                    return;
                }
            }
            stopColorCycle(); 
            isColorCycling = true;

            colorCycleIntervalId = setInterval(() => {
                if (!isColorCycling || !colorCanvasContext) return;

                const canvasWidth = colorBarCanvas.width;
                if (canvasWidth === 0) return; 

                cyclePosition = (cyclePosition + 1) % canvasWidth;

                const pixelData = colorCanvasContext.getImageData(cyclePosition, 1, 1, 1).data;
                const currentColor = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
                
                applyDialColor(currentColor);

            }, 50); 
        }

        colorBar.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return; 
            
            stopColorCycle(); 
            
            if (!colorCanvasContext) return;

            const barRect = e.currentTarget.getBoundingClientRect();
            const clickX = Math.round(e.clientX - barRect.left);

            if (clickX < 0 || clickX >= colorBarCanvas.width) return;
            
            cyclePosition = clickX; 
            
            const pixelData = colorCanvasContext.getImageData(clickX, 1, 1, 1).data;
            const clickedColor = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
            applyDialColor(clickedColor);
        });
        
        colorBar.addEventListener('dblclick', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            
            if (isColorCycling) {
                stopColorCycle();
            } else {
                startColorCycle();
            }
        });

        new ResizeObserver(initializeColorCanvas).observe(colorBar);
        
        
        // --- 14.6. منطق تغيير خلفية الشاشة ---
        
        function openBgImageSelector() {
            bgImageInput.click();
        }
        
        visualizer.addEventListener('click', openBgImageSelector);
        fmPlayerView.addEventListener('click', openBgImageSelector);
        videoPlayer.addEventListener('click', (e) => {
            if(e.target.tagName === 'VIDEO' || e.target.tagName === 'IFRAME') return;
            openBgImageSelector();
        });
        
        [visualizer, fmPlayerView, videoPlayer].forEach(el => {
            el.addEventListener('dblclick', (e) => {
                if(e.target.tagName === 'VIDEO' || e.target.tagName === 'IFRAME') return;
                
                if (confirm("هل تريد إزالة الخلفية المخصصة؟")) {
                    clearCustomBackground();
                }
            });
        });

        function handleBgImageSelect(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageUrl = e.target.result;
                    applyCustomBackground(imageUrl);
                    localStorage.setItem('customPlayerBackground', imageUrl);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = null;
        }
        
        bgImageInput.addEventListener('change', handleBgImageSelect);

        function applyCustomBackground(imageUrl) {
            const cssUrl = `url(${imageUrl})`;
            
            [visualizer, fmPlayerView, videoPlayer].forEach(el => {
                el.style.background = cssUrl;
                el.style.backgroundSize = 'cover';
                el.style.backgroundPosition = 'center';
                el.style.backgroundRepeat = 'no-repeat';
            });
        }
        
        function clearCustomBackground() {
            [visualizer, fmPlayerView, videoPlayer].forEach(el => {
                el.style.background = '';
                el.style.backgroundImage = '';
                el.style.backgroundSize = '';
                el.style.backgroundPosition = '';
                el.style.backgroundRepeat = '';
            });
            localStorage.removeItem('customPlayerBackground');
            
            visualizer.classList.add('viz-style-1'); 
            videoPlayer.style.background = '#000';
            fmPlayerView.style.background = 'var(--glass-bg)';
        }

        function loadCustomBackground() {
            const imageUrl = localStorage.getItem('customPlayerBackground');
            if (imageUrl) {
                applyCustomBackground(imageUrl);
            }
        }

        // =======================================


        // --- 15. بدء التشغيل ---
        loadStreamsFromStorage(); 
        updateVolumeDisplay(); 
        startColorCycle(); 
        loadCustomBackground(); 
        
        // *** التشغيل التلقائي عند البدء ***
        playDefaultStream(); 

    </script>

</body>
</html>
